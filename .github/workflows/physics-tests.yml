name: physics-tests

# Runs the physics regression suite on every push and pull request.
# The test target only depends on the header-only scientific core
# (src/2D/2D-physics plus the photon integrator, and src/3D/bh3d_blackbody.hpp
# for the accretion-disk colour physics), so it builds without Qt, SFML,
# OpenGL, or any GUI dependency at all. That's what keeps this job fast and
# reliable, since there's nothing heavy for it to install or link against.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  physics-regression:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile physics regression tests
        shell: bash
        run: |
          c++ -std=c++17 -O2 -I. \
            tests/physics_regression_tests.cpp \
            -o physics-regression-tests

      - name: Run physics regression tests
        shell: bash
        run: ./physics-regression-tests
